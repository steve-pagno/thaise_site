<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua Engenharia - Loja Virtual (Em Construção)</title>

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="shortcut icon" href="../img/logo-principal.ico" type="image/x-icon">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js" defer></script>
    <script src="../js/main.js" defer></script>

    <style>
        .em-construcao {
            padding: 100px 0;
            text-align: center;
            background-color: #f4f8fb;
            /* Mesma cor de fundo do Hero no seu CSS */
            min-height: 50vh;
            display: flex;
            align-items: center;
        }

        .em-construcao-content {
            background: white;
            padding: 50px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            max-width: 700px;
            margin: 0 auto;
        }

        .em-construcao i {
            font-size: 70px;
            color: var(--azul-claro);
            margin-bottom: 25px;
        }

        .em-construcao h2 {
            color: var(--azul-escuro);
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .em-construcao p {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
        }
    </style>
</head>

<body>

    <aqua-header></aqua-header>

    <section class="page-banner solucoes-banner">
        <div class="container">
            <h2>LOJA VIRTUAL</h2>
        </div>
    </section>

    <section class="em-construcao">
        <div class="container">
            <div class="em-construcao-content" data-aos="fade-up">
                <i class="fas fa-tools"></i>
                <h2>Página em Construção</h2>
                <p>Nossa loja virtual está sendo preparada para oferecer a você a melhor e mais rápida experiência de
                    compra em equipamentos para tratamento de água. Em breve teremos muitas novidades!</p>

                <a href="../" class="btn">VOLTAR PARA O INÍCIO</a>
            </div>
        </div>
    </section>

    <aqua-footer></aqua-footer>

</body>

</html>
